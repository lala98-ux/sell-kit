<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>도입 문의 — 셀킷 sellkit</title>
  <meta name="description" content="셀킷 도입 문의. 우리 쇼핑몰에 맞는 킷을 안내해 드립니다.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=20260709a">
</head>
<body>

<div id="sellkit-header"></div>

<main class="contact-page">
  <div class="contact-wrap">

    <div class="contact-head">
      <h1>도입 문의</h1>
      <p>궁금한 점을 남겨주시면 빠르게 답변드릴게요.<br>우리 쇼핑몰에 딱 맞는 킷도 함께 안내해 드립니다.</p>
    </div>

    <form class="contact-form" id="inquiryForm" novalidate>
      <div class="form-field">
        <label for="fName">담당자명<span class="req">*</span></label>
        <input type="text" id="fName" name="name" placeholder="이름을 입력해 주세요" autocomplete="name">
        <p class="field-error"></p>
      </div>

      <div class="form-field">
        <label for="fEmail">이메일<span class="req">*</span></label>
        <input type="email" id="fEmail" name="email" placeholder="example@email.com" autocomplete="email">
        <p class="field-error"></p>
      </div>

      <div class="form-field">
        <label for="fPhone">연락처<span class="req">*</span></label>
        <input type="tel" id="fPhone" name="phone" placeholder="010-0000-0000" autocomplete="tel" inputmode="numeric">
        <p class="field-error"></p>
      </div>

      <div class="form-field">
        <label>문의할 킷<span class="req">*</span> <span class="opt-label">(중복 선택 가능)</span></label>
        <div class="kit-select" id="kitSelect"></div>
        <p class="field-error"></p>
      </div>

      <div class="form-field">
        <label id="catLabel">문의 카테고리<span class="req">*</span></label>
        <div class="cat-dd" id="catDD">
          <button type="button" class="cat-trigger" id="catTrigger" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="catLabel">
            <span class="cat-value is-placeholder">카테고리를 선택해 주세요</span>
            <svg class="cat-arrow" width="12" height="7" viewBox="0 0 12 7" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <ul class="cat-menu" id="catMenu" role="listbox" aria-labelledby="catLabel">
            <li class="cat-opt" role="option" data-value="기능 문의">기능 문의</li>
            <li class="cat-opt" role="option" data-value="오류 신고">오류 신고</li>
            <li class="cat-opt" role="option" data-value="결제·구독">결제·구독</li>
            <li class="cat-opt" role="option" data-value="설치·연동">설치·연동</li>
            <li class="cat-opt" role="option" data-value="디자인·노출">디자인·노출</li>
            <li class="cat-opt" role="option" data-value="기타">기타</li>
          </ul>
        </div>
        <input type="hidden" id="fCategory" name="category">
        <p class="field-error"></p>
      </div>

      <div class="form-field">
        <label for="fMessage">문의 내용<span class="req">*</span></label>
        <textarea id="fMessage" name="message" maxlength="1000" placeholder="쇼핑몰 주소와 함께 궁금한 내용을 자유롭게 남겨주세요."></textarea>
        <div class="char-count"><span id="msgCount">0</span>/1000</div>
        <p class="field-error"></p>
      </div>

      <div class="consent-box">
        <div class="consent-row all">
          <input type="checkbox" id="agreeAll">
          <label for="agreeAll">전체 동의</label>
        </div>
        <div class="consent-row">
          <input type="checkbox" id="agreeTerms">
          <label for="agreeTerms">[필수] 이용약관 동의</label>
          <button type="button" class="consent-view" onclick="sellkitOpenLegal('terms')">보기</button>
        </div>
        <div class="consent-row">
          <input type="checkbox" id="agreePrivacy">
          <label for="agreePrivacy">[필수] 개인정보처리방침 동의</label>
          <button type="button" class="consent-view" onclick="sellkitOpenLegal('privacy')">보기</button>
        </div>
        <p class="consent-error">필수 약관에 모두 동의해 주세요.</p>
      </div>

      <p class="form-global-error" id="formGlobalError">접수 중 문제가 발생했어요. 잠시 후 다시 시도해 주세요.</p>

      <button type="submit" class="btn btn-primary" id="submitBtn">문의 접수하기</button>
    </form>

    <div class="form-success" id="formSuccess" style="display:none">
      <div class="check">✓</div>
      <h2>문의가 접수되었습니다</h2>
      <p>남겨주신 연락처로 빠르게 답변드릴게요.<br>영업일 기준 1~2일 내에 연락드립니다.</p>
      <a class="btn btn-primary" href="index.html">홈으로 돌아가기</a>
    </div>

  </div>
</main>

<div id="sellkit-footer"></div>

<script src="assets/js/kits.js"></script>
<script src="assets/js/legal.js"></script>
<script src="assets/js/header.js"></script>
<script src="assets/js/footer.js"></script>
<script src="assets/js/contact.js"></script>

</body>
</html>
